name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (with dev extras)
        run: |
          python -m pip install --upgrade pip
          # Install the project + dev extras so pytest/ruff are available.
          pip install -e ".[dev]"
          # We intentionally don't run `playwright install chromium` in CI —
          # unit tests avoid the real browser by using fakes / mocks.

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -v
